# =============================================================================
# SavVio ML Pipeline — Docker Compose
# =============================================================================
# Services:
#   - postgres:       MLflow metadata backend (port 5433 to avoid conflict with Airflow's 5432)
#   - storage:        Local S3-compatible artifact store (RustFS)
#   - create-bucket:  One-shot init to create the S3 bucket
#   - mlflow:         MLflow tracking server UI + API
#   - ml-trainer:     The compute environment where model training code runs
# =============================================================================

volumes:
  pgdata:
  storage-data:


services:
  postgres:
    image: postgres:15
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # NOTE: Using 5433 on host to avoid conflict with data_pipeline Airflow Postgres (5432)
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 10

  storage:
    image: rustfs/rustfs:1.0.0-alpha.83
    container_name: storage
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_SERVER_DOMAINS: storage:9000
      RUSTFS_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      RUSTFS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-s3admin}
      RUSTFS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-s3admin}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - storage-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", 'curl -s http://127.0.0.1:9000/health | grep -q ''"status":"ok"''' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  create-bucket:
    image: amazon/aws-cli:2.33.25
    container_name: mlflow-create-bucket
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        set -e;
        echo 'Waiting for S3 gateway getting ready...';
        if aws --endpoint-url=${MLFLOW_S3_ENDPOINT_URL} s3api head-bucket --bucket ${S3_BUCKET} 2>/dev/null; then
          echo 'Bucket ${S3_BUCKET} already exists. Skipping creation.';
        else
          echo 'Creating bucket ${S3_BUCKET}...';
          aws --endpoint-url=${MLFLOW_S3_ENDPOINT_URL} s3api create-bucket --bucket ${S3_BUCKET} --region ${AWS_DEFAULT_REGION};
        fi
      "
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_S3_ADDRESSING_STYLE: path
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      S3_BUCKET: ${S3_BUCKET}
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:${MLFLOW_VERSION}
    container_name: mlflow-server
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    environment:
      # Backend store URI built from vars
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}

      # ----------------------------------------------------
      # Option 1: Local S3/RustFS settings (Current)
      # ----------------------------------------------------
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      MLFLOW_ARTIFACTS_DESTINATION: ${MLFLOW_ARTIFACTS_DESTINATION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      MLFLOW_S3_IGNORE_TLS: "true"

      # ----------------------------------------------------
      # Option 2: GCP Artifact Storage (Commented out for future deployment)
      # ----------------------------------------------------
      # MLFLOW_ARTIFACTS_DESTINATION: gs://your-mlflow-artifacts-bucket/
      # GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-credentials.json
      #
      # (Don't forget to mount your service account key in the volumes section below)
      # ----------------------------------------------------

      # Server host/port
      MLFLOW_HOST: ${MLFLOW_HOST}
      MLFLOW_PORT: ${MLFLOW_PORT}
    # volumes:  # Uncomment these when switching to GCP to pass the real credentials
    #   - ./gcp-credentials.json:/app/gcp-credentials.json:ro
    command:
      - /bin/bash
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary boto3 google-cloud-storage
        mlflow server \
          --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}" \
          --artifacts-destination "${MLFLOW_ARTIFACTS_DESTINATION}" \
          --serve-artifacts \
          --host "${MLFLOW_HOST}" \
          --port "${MLFLOW_PORT}"
    ports:
      - "${MLFLOW_PORT}:${MLFLOW_PORT}"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${MLFLOW_PORT}/health')" ]
      interval: 10s
      timeout: 5s
      retries: 30

  # ============================================================
  # ML Trainer — Compute environment for model training
  # ============================================================
  ml-trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savvio-ml-trainer
    depends_on:
      mlflow:
        condition: service_healthy
    tty: true
    stdin_open: true
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ../data_pipeline/dags/data:/app/data
      - ../savviocore:/app/savviocore
      - ./pyproject.toml:/app/pyproject.toml
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:${MLFLOW_PORT}
    ports:
      - "8888:8888"
    # ----------------------------------------------------------
    # GPU/CUDA Support (Uncomment below when using nvidia/cuda Dockerfile)
    # Requires: NVIDIA Container Toolkit installed on host
    # ----------------------------------------------------------
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [ gpu ]

networks:
  default:
    name: mlflow-network
